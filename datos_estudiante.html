<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del Estudiante</title>
</head>
<body>
    <!-- Esta es la sección visible de la página web-->
    <h1>Registro de Estudiantes - ESPECIALIDAD EN SISTEMAS 2026</h1>
    <!-- Formulario web-->
    <form action="#" method="">
        <!-- Sección de datos del estudiante -->
        <fieldset>
            <legend>Datos del Estudiante</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <br>
            <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
            <label for="lugar_nacimiento">Lugar de Nacimiento:</label>
            <input type="text" id="lugar_nacimiento" name="lugar_nacimiento">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad">
            <br>
            <br>
            <label for="tipo_documento">Tipo de Documento:</label>
            <select name="tipo_documento" id="tipo_documento">
                <option value="T.I">Tarjeta de Identidad</option>
                <option value="C.C">Cédula de Ciudadanía</option>
            </select>
            <label for="numero_documento">Número de Documento:</label>
            <input type="text" id="numero_documento" name="numero_documento">
            <br>
            <br>
            <label for="lugar_expedicion">Lugar Expedición Documento Identidad:</label>
            <input type="text" id="lugar_expedicion" name="lugar_expedicion">
            <br>
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad">
            <br>
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <br>
            <label for="email_personal">E-mail personal:</label>
            <input type="email" id="email_personal" name="email_personal">
            <label for="email_institucional">E-mail inst:</label>
            <input type="email" id="email_institucional" name="email_institucional">
            <br>
            <br>
            <label for="tipo_sangre">Tipo de Sangre:</label>
            <select name="tipo_sangre" id="tipo_sangre">
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
            <label for="eps">EPS:</label>
            <input type="text" id="eps" name="eps">
            <br>
            <br>
            <label for="enfermedad">¿Sufre alguna enfermedad?</label>
            <select name="enfermedad" id="enfermedad">
                <option value="si">Si</option>
                <option value="no">No</option>
            </select>
            <label for="nombre_enfermedad">Cuál?:</label>
            <input type="text" id="nombre_enfermedad" name="nombre_enfermedad">
            <br>
            <br>
            <label for="estrato">Estrato socioeconómico:</label>
            <input type="number" id="estrato" name="estrato">
            <label for="familias_accion">Familias en Acción:</label>
            <select name="familias_accion" id="familias_accion">
                <option value="si">Si</option>
                <option value="no">No</option>
            </select>
            <br>
            <br>
            <label for="religion">Tipo de Religión:</label>
            <input type="text" id="religion" name="religion">
            <label for="relacion_padres">Relación Padres:</label>
            <select name="relacion_padres" id="relacion_padres">
                <option value="casados">Casados</option>
                <option value="divorciados">Divorciados</option>
                <option value="union_libre">Unión Libre</option>
            </select>
            <label for="otro">Otro:</label>
            <input type="text" id="otro" name="otro">
            <br>
            <br>
            <label for="compu_en_casa">Computador en casa</label>
            <select name="compu_en_casa" id="compu_en_casa">
                <option value="si">Si</option>
                <option value="no">No</option>
            </select>
            <label for="internet_en_casa">Internet en casa</label>
            <select name="internet_en_casa" id="internet_en_casa">
                <option value="si">Si</option>
                <option value="no">No</option>
            </select>   
            <br>
            <br>
            <label for = "actividades_tiempo_libre">¿Cuáles son las principales actividades que usted realiza en su tiempo libre?</label>
            <textarea id="actividades_tiempo_libre" name="actividades_tiempo_libre"></textarea>
            <br>
            <br>
            <label for="propositos_personales">¿Cuáles son sus propósitos y espectativas personales y académicas como estudiante de la Especialidad en Sistemas?</label>
            <textarea id="propositos_personales" name="propositos_personales"></textarea>
        </fieldset>

        <br>
        <br>
        <br>

        <!-- Sección de datos del padre -->
        <fieldset>
            <legend>Datos del Padre</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <br>
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <br>
            <br>
            <label for="ocupacion">Ocupación:</label>
            <input type="text" id="ocupacion" name="ocupacion">
        </fieldset>

        <br>
        <br>
        <br>

        <!-- Sección de datos de la madre -->
        <fieldset>
            <legend>Datos de la Madre</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <br>
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <br>
            <br>
            <label for="ocupacion">Ocupación:</label>
            <input type="text" id="ocupacion" name="ocupacion">
        </fieldset>

        <br>
        <br>
        <br>
        <!-- Sección de datos del acudiente -->
        <fieldset>
            <legend>Datos del acudiente</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <label for="parentesco">Parentesco:</label>
            <input type="text" id="parentesco" name="parentesco">
            <br>
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <br>
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <br>
            <br>
            <label for="ocupacion">Ocupación:</label>
            <input type="text" id="ocupacion" name="ocupacion">
        </fieldset>
        <br>
        <br>
        <h1>Ser Guanentino, Honor que Cuesta</h1>
        <br>
        <button type="submit">Enviar formulario</button>
        <button type="reset">Limpiar datos</button>

    </form>
</body>
</html>
