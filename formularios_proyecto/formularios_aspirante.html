<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntoUni</title>
</head>
<body>
    <!-- Esta es la sección visible de la página web-->
    <h1>Formulario del Aspirante - IntoUni</h1>
    <!-- Formulario web-->
    <form action="#" method="">
        <!-- Sección de datos del aspirante -->
        <fieldset>
            <legend>Datos del Aspirante</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <label for="celular">Teléfono:</label>
            <input type="number" id="celular" name="celular "> 
            <br>
            <br>
            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad">
            <br>
            <br>
            <label for="colegio_origen">Colegio de Origen:</label>
            <textarea id="colegio_origen" name="colegio_origen"></textarea>
            <br>
            <br>
            <label for="area_interes">Área de Interés:</label>
            <select name="area_interes" id="area_interes">
                <option value="Ingeniería">Ingeniería</option>
                <option value="Ciencias o salud">Ciencias o salud</option>
                <option value="Artes">Artes</option>
                <option value="Humanidades">Humanidades</option>
                <option value="Idiomas">Idiomas</option>
            </select>
            <br>
            <br>
            <label for="tipo_uni_interes">Tipo de la Universidad de Interés:</label>
            <select name="tipo_uni_interes" id="tipo_uni_interes">
                <option value="publica">Pública</option>
                <option value="privada">Privada</option>
            </select>
            <br>
            <br>
            <label for="ciudad_uni_interes">Ciudad de la Universidad de Interés:</label>
            <input type="text" id="ciudad_uni_interes" name="ciudad_uni_interes">

        </fieldset>
        <br>
        <h1>IntoUni: tu guía a la educación superior</h1>
        <br>
        <button type="submit">Enviar formulario</button>
        <button type="reset">Limpiar datos</button>

    </form>
</body>
</html>
