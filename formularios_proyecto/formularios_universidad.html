<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntoUni</title>
</head>
<body>
    <!-- Esta es la sección visible de la página web-->
    <h1>Formulario de la Universidad - IntoUni</h1>
    <!-- Formulario web-->
    <form action="#" method="">
        <!-- Sección de datos de la universidad -->
        <fieldset>
            <legend>Datos de la Universidad</legend>
            <label for="nombre_uni">Nombre de la Universidad:</label>
            <input type="text" id="nombre_uni" name="nombre_uni">
            <br>
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono"> 
            <br>
            <br>
            <label for="departamento">Departamento de la sede principal:</label>
            <input type="text" id="departamento" name="departamento">
            <label for="ciudad_principal">Ciudad de la Sede Principal:</label>
            <input type="text" id="ciudad_principal" name="ciudad_principal">
            <br>
            <br>
            <label for="tipo_uni">Tipo de Universidad:</label>
            <select name="tipo_uni" id="tipo_uni">
                <option value="publica">Pública</option>
                <option value="privada">Privada</option>
            </select>
            <br>
            <br>
            <label for="num_sedes">Número de Sedes:</label>
            <input type="number" id="num_sedes" name="num_sedes">
            <label for="num_programas">Número de Programas Académicos:</label>
            <input type="number" id="num_programas" name="num_programas">
            <br>
            <br>
            <label for="beneficios">Beneficios económicos y apoyos que ofrece:</label>
            <select name="beneficios" id="beneficios">
                <option value="Becas de Excelencia Académica:">Becas de Excelencia Académica:</option>
                <option value="Becas Socioeconómicas">Becas Socioeconómicas</option>
                <option value="Becas Deportivas">Becas Deportivas</option>
                <option value="Becas Culturales/Artísticas">Becas Culturales/Artísticas</option>
                <option value="Becas de Movilidad/Intercambio">Becas de Movilidad/Intercambio</option>
                <option value="Becas para Educación Online">Becas para Educación Online</option>
                <option value="Becas Totales (100%)">Becas Totales (100%)</option>
                <option value="Becas Parciales">Becas Parciales</option>
                <option value="Becas de Sostenimiento (Apoyo Económico)">Becas de Sostenimiento (Apoyo Económico)</option>
                <option value="Descuentos por Convenios">Descuentos por Convenios</option>
                <option value="Financiación sin Intereses/Cuotas Blandas">Financiación sin Intereses/Cuotas Blandas</option>
                <option value="Gratuidad Educativa">Gratuidad Educativa</option>
                <option value="Monitorías y Asistencias">Monitorías y Asistencias</option>
                <option value="ninguna">ninguna</option>
            </select>
            <label for="otro">Otro:</label>
            <input type="text" id="otro" name="otro">
            <br>
            <br>
            <label for="interes_uni">¿Está interesado como universidad en hablar con sus aspirantes?:</label>
            <select name="interes_uni" id="interes_uni">
                <option value="si">Sí</option>
                <option value="no">No</option>
            </select>

        </fieldset>
        <br>
        <h1>IntoUni: tu guía a la educación superior</h1>
        <br>
        <button type="submit">Enviar formulario</button>
        <button type="reset">Limpiar datos</button>

    </form>
</body>
</html>
